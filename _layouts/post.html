---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  {% if page.categories %}
    <p class="post-categories">
      {% for cat in page.categories %}
        <a href="/{{ page.collection | slice: 0,2 }}/{{ cat }}">{{ cat }}</a>{% unless forloop.last %} • {% endunless %}
      {% endfor %}
    </p>
  {% endif %}
  {{ content }}
</article>

{% include post-nav.html %}
